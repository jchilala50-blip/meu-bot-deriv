<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubiko Trader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #06080d; color: #ffffff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: #161d27; padding: 40px; border-radius: 8px; text-align: center; width: 350px; border: 1px solid #242e3a; }
        h2 { font-size: 24px; margin-bottom: 15px; font-weight: bold; }
        p { color: #9ca3af; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
        .btn-main { background: #00e6eb; color: #000; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 20px; }
        .link-create { color: #9ca3af; text-decoration: underline; font-size: 14px; cursor: pointer; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="siteAuth" class="auth-card">
        <h2>Authorization Required</h2>
        <p>To perform operations and access exclusive resources, login or create your account.</p>
        <button class="btn-main" onclick="iniciarLogin()">Login</button>
        <span class="link-create">Create an account</span>
    </div>

    <script>
        const CLIENT_ID = '33h1f6Rj6AYZdwVVuiBzP'; 
        const REDIRECT_URI = 'https://meu-bot-deriv-2.onrender.com';

        function iniciarLogin() {
            const encodedRedirect = encodeURIComponent(REDIRECT_URI);
            window.location.href = `https://oauth.deriv.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodedRedirect}&l=pt`;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const acct1 = urlParams.get('acct1');
            if (acct1) {
                document.getElementById('siteAuth').innerHTML = `<h2>Conectado</h2><p>Conta: ${acct1}</p>`;
            }
        };
    </script>
</body>
</html>
