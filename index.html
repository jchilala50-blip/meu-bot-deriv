<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubiko Trader</title> <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #ffffff; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh;
        }
        .header {
            position: absolute;
            top: 20px;
            width: 100%;
        }
        .header h1 {
            color: #ff4444;
            font-size: 2.5em;
            letter-spacing: 2px;
            margin: 0;
        }
        .card { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 20px; 
            max-width: 380px; 
            margin: auto; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }
        .btn-deriv { 
            background: #ff4444; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-deriv:hover {
            background: #cc3333;
            transform: translateY(-2px);
        }
        #info { margin-top: 25px; color: #00ff00; font-weight: 500; }
        p { color: #aaa; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KUBIKO TRADER</h1>
    </div>

    <div class="card">
        <p>Acesse sua conta Deriv com segurança para começar a operar.</p>
        <button class="btn-deriv" onclick="fazerLogin()">ENTRAR COM DERIV</button>
        <div id="info">Aguardando conexão...</div>
    </div>

    <script>
        // SUBSTITUA PELO NÚMERO QUE APARECER NO PAINEL DA DERIV
        const APP_ID = 'SEU_APP_ID_AQUI'; 

        function fazerLogin() {
            if (APP_ID === 'SEU_APP_ID_AQUI') {
                alert("Por favor, coloque o seu App ID no código antes de prosseguir.");
                return;
            }
            // Manda para o login oficial
            const url = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=pt`;
            window.location.href = url;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token1'); 

            if (token) {
                document.getElementById('info').innerText = "Autenticando na Kubiko Trader...";
                conectarComToken(token);
            }
        };

        function conectarComToken(token) {
            const ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
            ws.onmessage = (msg) => {
                const res = JSON.parse(msg.data);
                if (res.msg_type === 'authorize' && !res.error) {
                    document.getElementById('info').innerText = "CONECTADO: " + res.authorize.email;
                } else if (res.error) {
                    document.getElementById('info').innerText = "Erro: " + res.error.message;
                    document.getElementById('info').style.color = "#ff4444";
                }
            };
        }
    </script>
</body>
</html>
